const { useState, useEffect, useCallback, useRef } = React;

const BASE_W = 1440;
const BASE_H = 900;

function useWindowSize() {
  const [size, setSize] = useState({ w: window.innerWidth, h: window.innerHeight });
  useEffect(() => {
    const h = () => setSize({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return { ...size, isMobile: size.w < 768 };
}

function ScaledSlide({ children, availW, availH }) {
  const scale = Math.min(availW / BASE_W, availH / BASE_H);
  return (
    <div style={{ width: availW, height: availH, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', background:'#1a1a1a', flexShrink:0 }}>
      <div style={{ width: BASE_W, height: BASE_H, transform:`scale(${scale})`, transformOrigin:'center center', flexShrink:0 }}>
        {children}
      </div>
    </div>
  );
}

const C = {
  deepGreen: "#091D13",
  darkGreen: "#0d2619",
  green: "#17412D",
  mint: "#ECFFF5",
  warmCream: "#FDF8F3",
  darkRed: "#7A1B1B",
  accentTeal: "#3AA87C",
  muted: "#556B62",
  mutedLight: "#8aab9b",
  border: "#ddd8d0",
};

function Fade({ children, delay = 0, style = {} }) {
  const [v, setV] = useState(false);
  useEffect(() => { const t = setTimeout(() => setV(true), delay); return () => clearTimeout(t); }, []);
  return (
    <div style={{ opacity: v?1:0, transform: v?"translateY(0)":"translateY(14px)", transition:"opacity 0.5s ease, transform 0.5s ease", ...style }}>
      {children}
    </div>
  );
}

// SHARED — CALCULATION PANEL ANIMATION
// ═══════════════════════════════════════
function CalcPanel() {
  const [tick, setTick] = useState(0);
  const [resolving, setResolving] = useState(new Set());
  const [done, setDone] = useState(false);

  const lpRows = [
    { lp: "Anchor LP I",     commitment: "$25.0M", contributed: "$18.4M", nav: "$31.2M" },
    { lp: "Pension Fund III",commitment: "$40.0M", contributed: "$34.1M", nav: "$52.8M" },
    { lp: "Endowment Co.",   commitment: "$10.0M", contributed: "$8.9M",  nav: "$14.1M" },
    { lp: "Family Office A", commitment: "$15.0M", contributed: "$12.2M", nav: "$19.7M" },
    { lp: "SWF Partners",    commitment: "$50.0M", contributed: "$44.0M", nav: "$71.3M" },
  ];
  const waterfall = [
    { tier: "Return of Capital",     pct: "100%", gp: "0%",   lp: "100%" },
    { tier: "Preferred Return (8%)", pct: "8%",   gp: "0%",   lp: "100%" },
    { tier: "GP Catch-Up",           pct: "—",    gp: "100%", lp: "0%"   },
    { tier: "Carried Interest",      pct: "20%",  gp: "20%",  lp: "80%"  },
  ];
  const carryValues = ["$1.24M", "$2.11M", "$0.52M", "$0.79M", "$3.38M"];
  const scenes = ["waterfall", "lp", "summary"];
  const scene = scenes[Math.min(tick, scenes.length - 1)];

  useEffect(() => {
    if (done) return;
    setResolving(new Set());
    const timers = [];
    if (scene === "lp") {
      lpRows.forEach((_, i) => {
        timers.push(setTimeout(() => {
          setResolving(prev => { const n = new Set(prev); n.add(i); return n; });
        }, 300 + i * 380));
      });
    }
    if (tick < scenes.length - 1) {
      timers.push(setTimeout(() => setTick(t => t + 1), scene === "lp" ? 4800 : 3600));
    } else {
      timers.push(setTimeout(() => setDone(true), scene === "lp" ? 4800 : 3600));
    }
    return () => timers.forEach(clearTimeout);
  }, [tick, done]);

  return (
    <div style={{ width:"100%", borderRadius:14, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(61,170,122,0.18)", overflow:"hidden", boxShadow:"0 8px 40px rgba(0,0,0,0.4)" }}>

        </div>
        <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginLeft:8, letterSpacing:1 }}>
          {scene === "waterfall" ? "Waterfall · Fund I · Q4 2025" : scene === "lp" ? "LP Economics · Carry Calculation" : "Distribution Summary · Q4 2025"}
        </span>
        <div style={{ marginLeft:"auto", display:"flex", gap:6 }}>
          {scenes.map((s,i) => (
            <div key={i} style={{ width:6, height:6, borderRadius:"50%", background: s===scene ? C.accentTeal : "rgba(255,255,255,0.15)", transition:"background 0.4s" }} />
          ))}
        </div>
      </div>

      {/* Body */}
      <div style={{ padding:"16px 18px", minHeight:220 }}>

        {scene === "waterfall" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr", marginBottom:8 }}>
              {["Tier","Rate","GP","LP"].map((h,i) => (
                <div key={i} style={{ fontSize:10, color:"rgba(61,170,122,0.6)", letterSpacing:2, fontWeight:700, textTransform:"uppercase", padding:"4px 10px", borderBottom:"1px solid rgba(61,170,122,0.12)" }}>{h}</div>
              ))}
            </div>
            {waterfall.map((row, i) => (
              <div key={i} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr", background: i%2===0 ? "rgba(255,255,255,0.03)" : "transparent", borderRadius:4, animation:`fadeIn 0.5s ease ${i*0.28}s both` }}>
                <div style={{ fontSize:12, color:C.mint, padding:"8px 10px", fontWeight:500 }}>{row.tier}</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.45)", padding:"8px 10px" }}>{row.pct}</div>
                <div style={{ fontSize:12, color: row.gp!=="0%" ? C.accentTeal : "rgba(255,255,255,0.25)", padding:"8px 10px", fontWeight: row.gp!=="0%" ? 700 : 400 }}>{row.gp}</div>
                <div style={{ fontSize:12, color: row.lp!=="0%" ? C.accentTeal : "rgba(255,255,255,0.25)", padding:"8px 10px", fontWeight: row.lp!=="0%" ? 700 : 400 }}>{row.lp}</div>
              </div>
            ))}
            <div style={{ marginTop:14, padding:"10px 12px", borderRadius:6, background:"rgba(61,170,122,0.08)", border:"1px solid rgba(61,170,122,0.2)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>

              <span style={{ fontSize:16, color:C.accentTeal, fontWeight:700 }}>$189.1M</span>
            </div>
          </div>
        )}

        {scene === "lp" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"1.6fr 1fr 1fr 1fr 1fr", marginBottom:8 }}>
              {["LP","Commitment","Contributed","NAV","Carry"].map((h,i) => (
                <div key={i} style={{ fontSize:10, color:"rgba(61,170,122,0.6)", letterSpacing:2, fontWeight:700, textTransform:"uppercase", padding:"4px 8px", borderBottom:"1px solid rgba(61,170,122,0.12)" }}>{h}</div>
              ))}
            </div>
            {lpRows.map((row, i) => (
              <div key={i} style={{ display:"grid", gridTemplateColumns:"1.6fr 1fr 1fr 1fr 1fr", background: i%2===0 ? "rgba(255,255,255,0.03)" : "transparent", borderRadius:4 }}>

                <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", padding:"7px 8px" }}>{row.nav}</div>
                <div style={{ fontSize:12, padding:"7px 8px", color: resolving.has(i) ? C.accentTeal : "rgba(255,255,255,0.2)", fontWeight: resolving.has(i) ? 700 : 400, transition:"color 0.3s" }}>
                  {resolving.has(i) ? carryValues[i] : "—"}
                </div>
              </div>
            ))}
          </div>
        )}

        {scene === "summary" && (
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {[
              { label:"Total Distributions", value:"$189.1M", sub:"Q4 2025 · Fund I" },
              { label:"GP Carry Earned",      value:"$14.8M",  sub:"20% on proceeds above hurdle" },
              { label:"LP Net Distributions", value:"$174.3M", sub:"Across 5 limited partners" },
              { label:"Preferred Return Met", value:"✓ 8.0%",  sub:"All LPs above hurdle threshold" },
            ].map((item, i) => (
              <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", borderRadius:8, background: i===0 ? "rgba(61,170,122,0.1)" : "rgba(255,255,255,0.03)", border:`1px solid ${i===0 ? "rgba(61,170,122,0.25)" : "rgba(255,255,255,0.06)"}`, animation:`fadeIn 0.5s ease ${i*0.22}s both` }}>
                <div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)", marginBottom:2 }}>{item.label}</div>
                  <div style={{ fontSize:10, color:"rgba(255,255,255,0.25)" }}>{item.sub}</div>
                </div>
                <div style={{ fontSize: i===0 ? 18 : 15, fontWeight:700, color: i===3 ? "#4ecb71" : C.accentTeal }}>{item.value}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{ padding:"8px 18px", borderTop:"1px solid rgba(61,170,122,0.1)", display:"flex", alignItems:"center", gap:8 }}>
        <div style={{ width:6, height:6, borderRadius:"50%", background: done ? "rgba(61,170,122,0.4)" : C.accentTeal, boxShadow: done ? "none" : `0 0 6px ${C.accentTeal}` }} />
        <span style={{ fontSize:10, color:"rgba(61,170,122,0.5)", letterSpacing:1 }}>
          {done ? "CALCULATION COMPLETE · Audit-ready" : "LIVE · Centralized · Audit-ready"}
        </span>
        {done && (
          <button onClick={() => { setTick(0); setDone(false); setResolving(new Set()); }} style={{ marginLeft:"auto", fontSize:10, color:"rgba(61,170,122,0.4)", background:"none", border:"1px solid rgba(61,170,122,0.2)", borderRadius:4, padding:"2px 8px", cursor:"pointer", letterSpacing:1 }}>
            REPLAY
          </button>
        )}
      </div>
    </div>
  );
}

              }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", border: "1.5px solid #3DAA7A", background: "rgba(61,170,122,0.08)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "#3DAA7A" }}>{i + 1}</span>
                </div>

              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

// SPEAKER NOTES
// ═══════════════════════════════════════
const notes = [
`SLIDE 1 — TITLE

No notes needed. Introduce yourself, one sentence. 10 seconds max.`,

`SLIDE 2 — AGENDA

Read the room before you click past this. If they seem impatient, move fast. If they seem skeptical, linger here — the "we're not here to fit a square peg" line lands best when said out loud, not just shown.

Goal of this slide: lower their guard before you need anything from them.`,

`SLIDE 3 — STATUS QUO

Deliver the opening statement before advancing past the headline. Do not read it off the slide — internalize it. It should sound like an observation, not a pitch.

QUESTIONS
• "Where do the waterfall and fee calculations actually live today?"
• "Who built those models, and who runs them each quarter?"
• "What happens if that person is unavailable during close?"
• "How does your team spot-check the numbers before they go out?"

LISTEN FOR
• "One person owns all of it"
• "We double-check everything manually"
• "That's why close takes so long"
• Mentions of near-misses, restatements, or reconciliation pain
• "It works fine" — normalize and probe gently`,

`SLIDE 4 — WHERE MAYBERN SITS

This slide does one thing: shows the prospect where Maybern lives relative to what they already have. Not instead of their GL. Not instead of their admin. In between.

HOW TO POSITION IT
Lead with the architecture on the left — GL feeds in, admin and LP portal receive output. Maybern sits in the middle owning the calculation layer. Most fund controllers have never seen this drawn out cleanly. Let them look at it.

Then click the house of cards. The point isn't to scare them — it's to name something they already feel. Their current process works until it doesn't, and everyone in that seat knows it.

The pull quote at the bottom is your close on this slide: "Your GL records what happened. Your admin reports it. Maybern is where you prove it — before anyone asks." Say it or let them read it. Either way, move on.

Do not oversell here. This slide earns the right to ask questions on the next one.`,

`SLIDE 5 — DISCOVERY

The questions on screen cover admin relationship, operating model, and evaluation. Work through them naturally.

MEDDPICC GATES

• "Roughly how many hours does your team spend on the waterfall and distribution process each quarter — and has an error ever made it to an LP?"
→ Covers Metrics. You need a number, even a rough one.

• "What made you take this call today — and who ultimately owns a decision like this inside your org?"
→ Covers Why Now + Economic Buyer in one. Listen for a name and a title.

RILEY'S GATE — before moving to Initial Demo
✓ Pain quantified (even roughly)
✓ Economic buyer identified by name
✓ "Why Now" captured in your own words
✓ Champion identified or hypothesis documented
✓ Stakeholder org chart started in SFDC`,

`SLIDE 6 — RECAP & FIT CHECK

Let the slide do the recap — walk through the left column briefly, one sentence per item. Then hand it to them.

Script for the right column: "Before we go any further, I want to put four things on the table. These are the bare minimum for Maybern to actually be relevant to you. I'd rather we discuss it now than waste anyone's time."

Then read each item and pause. Let them respond. Do not fill the silence.

WHAT YOU'RE LISTENING FOR
• Item 1 — do they own the logic or is it truly outsourced? If outsourced with no desire to own it, the deal isn't there.
• Item 2 — do they acknowledge fragility? Even "it's manageable but..." is enough.
• Item 3 — complexity confirmation. Flat 2-and-20 with three LPs and no side letters? Say so honestly.
• Item 4 — THIS IS THE GATE. If they can't name a trigger, the deal has no urgency. Probe: "What's coming up in the next quarter that makes this timely?"

IF ALL FOUR ARE TRUE → "Then it sounds like there's enough here to go further. Let's schedule the walkthrough."
IF ONE IS UNCLEAR → "Let's spend a minute on that one before we commit to a next step."
IF ONE IS FALSE → "That's actually helpful to know now — here's where I think that changes things..."

The goal is not to close. It's to earn the right to the next meeting honestly.`,

`SLIDE 7 — NEXT STEP

The ask is a product demo — a light walkthrough using standard calculation examples. Not tailored to their fund yet. Just enough for them to see the system work.

Before you close the call, get three things:

1. WHO SHOULD BE IN THE ROOM
"Is it worth having your [CFO / managing partner / decision maker] join — or do you want to see it first and bring them in after?"
Don't assume. Let them tell you the internal dynamic.

2. WHAT TO SHOW
"To make the demo relevant, what structure should we use as the example — European waterfall, deal-by-deal, something else?"
Even a rough answer lets you load the right scenario.

3. WHEN
Get a specific date and time on the calendar before you hang up. A "sounds good, send me something" is not a next step.`,
];


// ═══════════════════════════════════════
// SHELL
// ═══════════════════════════════════════
const slideComponents = [Slide1, SlideGoals, Slide2, Slide3, SlideDiscovery, Slide4, Slide5];
const slideLabels = ["01 · Title", "02 · Agenda", "03 · Status Quo", "04 · Where We Sit", "05 · Discovery", "06 · Fit Check", "07 · Next Step"];
const totalSlides = slideComponents.length;

function AudienceView({ slideIndex, slideKey }) {
  const { w, h } = useWindowSize();
  const S = slideComponents[slideIndex];
  return (
    <div style={{ width:"100vw", height:"100vh", background:"#1a1a1a", overflow:"hidden", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <ScaledSlide availW={w} availH={h}>
        <div key={slideKey} style={{ width:BASE_W, height:BASE_H }}><S /></div>
      </ScaledSlide>
    </div>
  );
}

function App() {
  const [current, setCurrent] = useState(0);
  const [slideKey, setSlideKey] = useState(0);
  const [showNotes, setShowNotes] = useState(false);
  const [presenting, setPresenting] = useState(false);
  const [audienceWin, setAudienceWin] = useState(null);
  const [isAudience] = useState(() => { try { return window.name==="maybern_audience"; } catch(e){ return false; } });
  const { w, h, isMobile } = useWindowSize();
  const touchStartX = useRef(null);
  const touchStartY = useRef(null);

  useEffect(() => {
    if (!isAudience) return;
    const handler = e => { if (e.data?.type==="maybern_slide") { setCurrent(e.data.index); setSlideKey(k=>k+1); } };
    window.addEventListener("message", handler);
    return () => window.removeEventListener("message", handler);
  }, [isAudience]);

  const goTo = useCallback((idx) => {
    setCurrent(idx); setSlideKey(k=>k+1);
    if (audienceWin && !audienceWin.closed) audienceWin.postMessage({ type:"maybern_slide",index:idx }, "*");
  }, [audienceWin]);

  const startPresenting = useCallback(() => {
    const win = window.open(window.location.href, "maybern_audience");
    if (win) { setAudienceWin(win); setPresenting(true); setShowNotes(true); setTimeout(() => win.postMessage({ type:"maybern_slide",index:current }, "*"), 1200); }
  }, [current]);

  const stopPresenting = useCallback(() => {
    if (audienceWin && !audienceWin.closed) audienceWin.close();
    setAudienceWin(null); setPresenting(false);
  }, [audienceWin]);

  useEffect(() => {
    if (!presenting || !audienceWin) return;
    const id = setInterval(() => { if (audienceWin.closed) { setPresenting(false); setAudienceWin(null); } }, 1000);
    return () => clearInterval(id);
  }, [presenting, audienceWin]);

  useEffect(() => {
    const h = e => {
      if (e.key==="ArrowRight"||e.key===" ") { e.preventDefault(); if(current<totalSlides-1) goTo(current+1); }
      if (e.key==="ArrowLeft") { e.preventDefault(); if(current>0) goTo(current-1); }
      if (e.key==="n"||e.key==="N") setShowNotes(p=>!p);
      if (e.key==="Escape"&&presenting) stopPresenting();
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [current, goTo, presenting, stopPresenting]);

  if (isAudience) return <AudienceView slideIndex={current} slideKey={slideKey} />;

  const S = slideComponents[current];
  const NextS = current+1 < totalSlides ? slideComponents[current+1] : null;

  const handleTouchStart = (e) => {
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
  };
  const handleTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    const dy = e.changedTouches[0].clientY - touchStartY.current;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      if (dx < 0 && current < totalSlides - 1) goTo(current + 1);
      if (dx > 0 && current > 0) goTo(current - 1);
    }
    touchStartX.current = null;
  };

  // ── MOBILE LAYOUT ──────────────────────────────────────────────
  if (isMobile) {
    const mobileSlideH = h - 56;
    return (
      <div style={{ width:"100vw", height:"100vh", background:"#0f1a14", overflow:"hidden", display:"flex", flexDirection:"column", fontFamily:"'DM Sans',sans-serif" }}
        onTouchStart={handleTouchStart}
        onTouchEnd={handleTouchEnd}
      >
        <ScaledSlide availW={w} availH={mobileSlideH}>
          <div key={slideKey} style={{ width:BASE_W, height:BASE_H }}><S /></div>
        </ScaledSlide>

        <div style={{ height:56, background:"rgba(9,29,19,0.97)", borderTop:"1px solid rgba(61,170,122,0.2)", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", flexShrink:0 }}>
          <button onClick={() => current>0&&goTo(current-1)} disabled={current===0}
            style={{ background:"none", border:"none", color:current===0?"rgba(61,170,122,0.2)":C.accentTeal, fontSize:22, cursor:current===0?"default":"pointer", padding:"4px 8px", lineHeight:1 }}>‹</button>
          <div style={{ display:"flex", gap:7, alignItems:"center" }}>
            {slideComponents.map((_,i) => (
              <div key={i} onClick={() => goTo(i)} style={{ width:i===current?22:7, height:7, borderRadius:4, background:i===current?C.accentTeal:"rgba(61,170,122,0.25)", transition:"all 0.25s ease", cursor:"pointer" }} />
            ))}
          </div>
          <button onClick={() => current<totalSlides-1&&goTo(current+1)} disabled={current===totalSlides-1}
            style={{ background:"none", border:"none", color:current===totalSlides-1?"rgba(61,170,122,0.2)":C.accentTeal, fontSize:22, cursor:current===totalSlides-1?"default":"pointer", padding:"4px 8px", lineHeight:1 }}>›</button>
        </div>
      </div>
    );
  }

  // ── DESKTOP LAYOUT ─────────────────────────────────────────────
  const presenterBarH = presenting ? 36 : 0;
  const navBarH = 50;
  const notesW = showNotes||presenting ? (presenting ? 360 : 300) : 0;
  const slideAvailW = w - notesW;
  const slideAvailH = h - presenterBarH - navBarH;

  return (
    <div style={{ width:"100%",height:"100vh",display:"flex",flexDirection:"column",background:"#1a1a1a",fontFamily:"'DM Sans',sans-serif" }}>
      {presenting && (
        <div style={{ background:C.deepGreen,borderBottom:`2px solid ${C.accentTeal}`,padding:"6px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,height:36 }}>
          <div style={{ display:"flex",alignItems:"center",gap:12 }}>
            <div style={{ display:"flex",alignItems:"center",gap:6 }}>
              <div style={{ width:7,height:7,borderRadius:"50%",background:"#ff3b30",boxShadow:"0 0 6px #ff3b30" }} />
              <span style={{ fontSize:10,fontWeight:700,color:C.accentTeal,letterSpacing:2 }}>PRESENTER MODE</span>
            </div>
            <span style={{ fontSize:10,color:"rgba(255,255,255,0.35)",letterSpacing:0.5 }}>Share the <strong style={{color:"rgba(255,255,255,0.6)"}}>Maybern Audience</strong> tab in Zoom/Teams — your client sees only the slide</span>
          </div>
          <button onClick={stopPresenting} style={{ background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.5)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:4,padding:"3px 12px",fontSize:10,fontWeight:600,cursor:"pointer",letterSpacing:1 }}>END SESSION</button>
        </div>
      )}

      <div style={{ flex:1,display:"flex",overflow:"hidden" }}>
        <div style={{ flex:1,position:"relative", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <ScaledSlide availW={slideAvailW} availH={slideAvailH}>
            <div key={slideKey} style={{ width:BASE_W, height:BASE_H }}><S /></div>
          </ScaledSlide>
        </div>

        {(showNotes||presenting) && (
          <div style={{ width:presenting?360:300,background:"#111",borderLeft:"1px solid #2a2a2a",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0 }}>
            {presenting && NextS && (
              <div style={{ flexShrink:0,borderBottom:"1px solid #2a2a2a" }}>
                <div style={{ fontSize:9,color:C.accentTeal,letterSpacing:2,fontWeight:600,padding:"7px 16px 4px",background:"#0a0a0a" }}>NEXT</div>
                <div style={{ height:130,position:"relative",overflow:"hidden",background:"#1a1a1a" }}>
                  <div style={{ transform:"scale(0.24)",transformOrigin:"top left",width:"417%",height:"417%",pointerEvents:"none" }}><NextS /></div>
                </div>
              </div>
            )}
            <div style={{ flex:1,overflowY:"auto",padding:"14px 18px" }}>
              <div style={{ fontSize:9,color:C.accentTeal,letterSpacing:3,fontWeight:600,marginBottom:10 }}>SPEAKER NOTES</div>
              <pre style={{ fontSize:presenting?13:12,color:"#ccc",whiteSpace:"pre-wrap",lineHeight:1.75,fontFamily:"'DM Sans',sans-serif" }}>
                {notes[current]}
              </pre>
            </div>
          </div>
        )}
      </div>

      <div style={{ background:"#111",borderTop:"1px solid #2a2a2a",padding:"9px 20px",display:"flex",alignItems:"center",gap:8,flexShrink:0,height:navBarH }}>
        <button onClick={() => current>0&&goTo(current-1)} disabled={current===0} style={{ background:"none",border:"none",color:current===0?"#333":"#888",fontSize:18,cursor:current===0?"default":"pointer",padding:"3px 7px" }}>◀</button>
        <div style={{ display:"flex",gap:4,flex:1,justifyContent:"center",flexWrap:"wrap" }}>
          {slideLabels.map((label,i) => (
            <button key={i} onClick={() => goTo(i)} style={{ background:i===current?C.accentTeal:"#222",color:i===current?C.deepGreen:"#666",border:"none",borderRadius:4,padding:"5px 10px",fontSize:9,fontWeight:i===current?700:400,cursor:"pointer",transition:"all 0.18s",letterSpacing:0.5 }}>{label}</button>
          ))}
        </div>
        <button onClick={() => current<totalSlides-1&&goTo(current+1)} disabled={current===totalSlides-1} style={{ background:"none",border:"none",color:current===totalSlides-1?"#333":"#888",fontSize:18,cursor:current===totalSlides-1?"default":"pointer",padding:"3px 7px" }}>▶</button>
        {!presenting ? (
          <>
            <button onClick={() => setShowNotes(p=>!p)} style={{ background:showNotes?C.accentTeal:"#2a2a2a",color:showNotes?C.deepGreen:"#888",border:"none",borderRadius:4,padding:"5px 12px",fontSize:10,fontWeight:600,cursor:"pointer",marginLeft:6,letterSpacing:1 }}>NOTES</button>
            <button onClick={startPresenting} style={{ background:C.accentTeal,color:C.deepGreen,border:"none",borderRadius:4,padding:"5px 16px",fontSize:10,fontWeight:700,cursor:"pointer",marginLeft:3,letterSpacing:1 }}>▶ PRESENT</button>
          </>
        ) : (
          <div style={{ marginLeft:8,fontSize:10,color:C.accentTeal,fontWeight:600,letterSpacing:1 }}>LIVE · ESC to end</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
