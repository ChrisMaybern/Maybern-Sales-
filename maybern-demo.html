// ─── Animated counter ───
function Counter({ end, suffix = "", duration = 1800 }) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    let start = 0;
    const step = end / (duration / 16);
    const id = setInterval(() => {
      start += step;
      if (start >= end) { setVal(end); clearInterval(id); }
      else setVal(Math.floor(start));
    }, 16);
    return () => clearInterval(id);
  }, [end, duration]);
  return <span>{val}{suffix}</span>;
}

// ─── Fade-in wrapper ───
function FadeIn({ children, delay = 0, className = "", style = {} }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setVisible(true), delay);
    return () => clearTimeout(t);
  }, [delay]);
  return (
    <div className={className} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(20px)",
      transition: "opacity 0.6s ease, transform 0.6s ease",
      ...style,
    }}>{children}</div>
  );
}

    { id:"wf",  x:33, y:42, label:"Waterfall Dist.", right:"$8.0M", wrong:"$800K", formula:"1.0% × $80M dist", layer:2 },
    { id:"mf",  x:60, y:42, label:"Mgmt Fee", right:"$1.0M/yr", wrong:"$100K/yr", formula:"$5M × 2.0% rate", layer:2 },
    { id:"olp", x:88, y:42, label:"Other 29 LPs", right:"90.0%", wrong:"99.0%", formula:"100% − 1.0%", layer:2 },
    { id:"pref",x:16, y:62, label:"Pref Return", right:"$4.0M", wrong:"$400K", formula:"$5M × 8% hurdle", layer:3 },
    { id:"carry",x:44, y:62, label:"GP Carry", right:"No carry yet", wrong:"+$1.32M phantom", formula:"20% above wrong pref", layer:3 },
    { id:"dist", x:74, y:62, label:"Dist. Notice", right:"30 correct wires", wrong:"30 wrong wires", formula:"alloc by wrong %", layer:3 },
    { id:"k1",   x:20, y:82, label:"K-1 Tax Filing", right:"$6.0M income", wrong:"$600K income", formula:"1.0% × $60M fund inc", layer:4 },
    { id:"stmt", x:50, y:82, label:"Statements", right:"All accurate", wrong:"All wrong", formula:"feeds from NAV + carry", layer:4 },
    { id:"port", x:80, y:82, label:"Investor Portal", right:"Accurate", wrong:"All incorrect", formula:"feeds from statements", layer:4 },
  ];

  const edges = [
    { f:"cap", t:"own", op:"÷ $500M fund" },
    { f:"cap", t:"fee", op:"= commitment" },
    { f:"own", t:"nav", op:"× $520M NAV" },
    { f:"own", t:"wf",  op:"× $80M dist" },
    { f:"own", t:"olp", op:"100% − own%" },
    { f:"fee", t:"mf",  op:"× 2.0% rate" },
    { f:"wf",  t:"pref", op:"× 8% hurdle" },
    { f:"mf",  t:"carry", op:"via fee offset" },
    { f:"pref",t:"carry", op:"20% above pref" },
    { f:"carry",t:"dist", op:"wire amounts" },
    { f:"olp", t:"dist", op:"wrong shares" },
    { f:"nav", t:"stmt", op:"report balances" },
    { f:"carry",t:"stmt", op:"carry figures" },
    { f:"dist",t:"k1",   op:"tax alloc %" },
    { f:"olp", t:"k1",   op:"% of income" },
    { f:"nav", t:"port",  op:"display data" },
    { f:"stmt",t:"port",  op:"feed portal" },
  ];

  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });
  const FUSE_DUR = 1800;
  const LAYER_GAP = 2200;

  const shake = (type, dur) => { setShakeType(type); setTimeout(() => setShakeType(null), dur); };
  const flash = () => { setFlashOn(true); setTimeout(() => setFlashOn(false), 600); };

  const detonateLayer = (layer) => {
    const ids = nodes.filter(n => n.layer === layer).map(n => n.id);
    setDetonatingNodes(new Set(ids));
    setHitNodes(prev => { const s = new Set(prev); ids.forEach(id => s.add(id)); return s; });
    setStep(layer);
    if (layer >= 3) { shake("big", 250); flash(); }
    else if (layer >= 2) shake("normal", 200);
    const ne = ids.flatMap(id => {
      const n = nodeMap[id];
      return [0].map(j => ({ id: id+"-e"+j, x: n.x, y: n.y-2, key: Date.now()+j }));
    });
    setEmbers(prev => [...prev, ...ne]);
    setTimeout(() => setDetonatingNodes(new Set()), 500);
    setTimeout(() => setEmbers(prev => prev.filter(e => !ne.find(x => x.id===e.id))), 1200);
  };

  const STAGGER = 350;

  const lightFuses = (fromLayer, onDone) => {
    const idxs = [];
    edges.forEach((e, i) => {
      if (nodeMap[e.f].layer === fromLayer && nodeMap[e.t].layer === fromLayer + 1) idxs.push(i);
    });
    idxs.forEach((idx, j) => {
      setTimeout(() => {
        setBurningEdges(prev => { const s = new Set(prev); s.add(idx); return s; });
        setTimeout(() => {
          setBurningEdges(prev => { const s = new Set(prev); s.delete(idx); return s; });
          setBurnedEdges(prev => { const s = new Set(prev); s.add(idx); return s; });
          if (j === idxs.length - 1 && onDone) onDone();
        }, FUSE_DUR);
      }, j * STAGGER);
    });
  };

  const layerTotalTime = (fromLayer) => {
    const count = edges.filter(e => nodeMap[e.f].layer === fromLayer && nodeMap[e.t].layer === fromLayer + 1).length;
    return (count - 1) * STAGGER + FUSE_DUR;
  };

  const startCascade = () => {
    if (phase !== "idle") return;
    setPhase("countdown"); setTimer(3);
    let t = 3;
    timerRef.current = setInterval(() => {
      t--;
      if (t > 0) { setTimer(t); }
      else {
        clearInterval(timerRef.current); setTimer(0);
        setPhase("cascading");
        detonateLayer(0);
        let cumulative = 450;
        [0,1,2,3].forEach(l => {
          const offset = cumulative;
          setTimeout(() => {
            lightFuses(l, () => {
              detonateLayer(l + 1);
            });
          }, offset);
          cumulative += layerTotalTime(l) + 400;
        });
        setTimeout(() => setPhase("done"), cumulative + 400);
      }
    }, 450);
  };

  const reset = () => {
    clearInterval(timerRef.current);
    setPhase("idle"); setTimer(3); setStep(-1); setShakeType(null);
    setFlashOn(false); setBurningEdges(new Set()); setBurnedEdges(new Set());
    setDetonatingNodes(new Set()); setHitNodes(new Set()); setEmbers([]);
  };

  return (
    <div style={{
      background: C.warmCream, minHeight:"100%", padding:"24px 44px 16px",
      display:"flex", flexDirection:"column", position:"relative", overflow:"hidden",
      animation: shakeType==="big" ? "bigShake 0.45s ease-out" : shakeType==="normal" ? "screenShake 0.35s ease-out" : "none",
    }}>
      {flashOn && <div style={{ position:"absolute", inset:0, zIndex:50, pointerEvents:"none", animation:"redFlash 0.6s ease-out forwards" }} />}

      <FadeIn delay={100}>
        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:4 }}>
          <div>
            <div style={{ width:60, height:3, background:C.darkRed, marginBottom:8 }} />
            <h2 style={{ fontFamily:"Georgia, serif", fontSize:26, color:C.deepGreen, fontWeight:400, marginBottom:4 }}>
              One wrong input. Every model breaks.
            </h2>
            <p style={{ fontSize:13, color:C.muted, marginBottom:2 }}>
              $500M fund, 30 LPs. An analyst enters LP-3's commitment as <span style={{ color:C.darkRed, fontWeight:700, fontFamily:"monospace" }}>$5,000,000</span> instead of <span style={{ color:C.deepGreen, fontWeight:700, fontFamily:"monospace" }}>$50,000,000</span>.
            </p>
          </div>
          {step >= 0 && (
            <div style={{ background:"rgba(122,27,27,0.06)", border:"1px solid rgba(122,27,27,0.15)", borderRadius:6, padding:"4px 10px", textAlign:"right", animation:"countUp 0.3s ease-out", flexShrink:0, marginLeft:16 }}>
              <div style={{ fontSize:10, color:C.darkRed, fontWeight:600, letterSpacing:1 }}>MODELS HIT</div>
              <div style={{ fontSize:20, color:C.darkRed, fontWeight:700, fontFamily:"monospace" }}>
                {nodes.filter(n => hitNodes.has(n.id)).length}<span style={{ fontSize:13, fontWeight:400 }}>/13</span>
              </div>
            </div>
          )}
        </div>
        <p style={{ fontSize:12, color: phase==="idle" ? C.accentTeal : C.muted, cursor: phase==="idle" ? "pointer" : "default", marginBottom:6, fontWeight:500 }}
          onClick={startCascade}>
          {phase==="idle" ? "▶ Click Capital Account to light the fuse" : phase==="countdown" ? "" : phase==="cascading" ? "Fuse burning…" : ""}
        </p>
      </FadeIn>

      <div style={{ position:"relative", flex:1, minHeight:300 }}>
        {/* SVG edges + sparks + formula labels */}
        <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none" }}>
          <defs>
            <filter id="fuseF"><feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
            <filter id="sparkF"><feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
          </defs>
          {edges.map((e, i) => {
            const fn = nodeMap[e.f], tn = nodeMap[e.t];
            const isBurning = burningEdges.has(i);
            const isBurned = burnedEdges.has(i);
            const isIdle = !isBurning && !isBurned;
            const mx = (fn.x + tn.x) / 2, my = ((fn.y + 4) + (tn.y - 2)) / 2;
            return (
              <React.Fragment key={i}>
                <line x1={`${fn.x}%`} y1={`${fn.y+4}%`} x2={`${tn.x}%`} y2={`${tn.y-2}%`}
                  stroke={isIdle ? "#d0ccc4" : isBurned ? "rgba(160,40,40,0.4)" : "transparent"}
                  strokeWidth={isIdle ? 1 : 2} opacity={isIdle ? 0.18 : 1}
                  style={isBurned ? { animation:"burnedGlow 2s infinite ease-in-out" } : {}} />
                {isBurning && <line x1={`${fn.x}%`} y1={`${fn.y+4}%`} x2={`${tn.x}%`} y2={`${tn.y-2}%`}
                  stroke="#ff6600" strokeWidth={3} strokeLinecap="round" filter="url(#fuseF)"
                  strokeDasharray="400" strokeDashoffset="400"
                  style={{ animation:`fuseBurn ${FUSE_DUR}ms linear forwards` }} />}
                {isBurning && <circle r="5" fill="#ffcc00" filter="url(#sparkF)">
                  <animate attributeName="cx" from={`${fn.x}%`} to={`${tn.x}%`} dur={`${FUSE_DUR}ms`} fill="freeze" />
                  <animate attributeName="cy" from={`${fn.y+4}%`} to={`${tn.y-2}%`} dur={`${FUSE_DUR}ms`} fill="freeze" />
                </circle>}
                {(isBurning || isBurned) && (
                  <text x={`${mx}%`} y={`${my}%`} textAnchor="middle" fontSize="9" fontWeight="600"
                    fill={isBurning ? "#cc4400" : "rgba(122,27,27,0.5)"} fontFamily="Inter, sans-serif"
                    style={{ animation:"errorSlide 0.3s ease-out" }}>
                    {e.op}
                  </text>
                )}
              </React.Fragment>
            );
          })}
        </svg>

        {/* Blast rings */}
        {nodes.filter(n => detonatingNodes.has(n.id)).map(n => (
          <React.Fragment key={n.id+"-bl"}>
            <div style={{ position:"absolute", left:`${n.x}%`, top:`${n.y}%`, width:60, height:60, borderRadius:"50%", border:"2px solid rgba(168,40,40,0.5)", animation:"blastRing 0.5s ease-out forwards", pointerEvents:"none", zIndex:1 }} />
          </React.Fragment>
        ))}

        {/* Embers */}
        {embers.map(e => (
          <div key={e.id+e.key} style={{ position:"absolute", left:`${e.x}%`, top:`${e.y}%`, width:4, height:4, borderRadius:"50%", background:"#ff6600", boxShadow:"0 0 4px #ff4400, 0 0 8px #ff2200", animation:"emberFloat 1s ease-out forwards", pointerEvents:"none", zIndex:4 }} />
        ))}

        {/* ── Nodes with real math ── */}
        {nodes.map(n => {
          const isHit = hitNodes.has(n.id);
          const isDet = detonatingNodes.has(n.id);
          const isSrc = n.layer === 0;
          const showTimer = phase==="countdown" && isSrc;
          return (
            <div key={n.id}
              onClick={() => isSrc && phase==="idle" && startCascade()}
              style={{
                position:"absolute", left:`${n.x}%`, top:`${n.y}%`,
                transform:"translate(-50%, -50%)",
                background: isHit ? (isSrc ? "#990000" : "#a82828") : "#fff",
                color: isHit ? "#fff" : C.deepGreen,
                borderRadius:6, padding:"5px 8px",
                fontSize:11, fontWeight:600, textAlign:"center",
                cursor: isSrc && phase==="idle" ? "pointer" : "default",
                boxShadow: isDet ? "0 0 16px rgba(168,40,40,0.4)"
                  : isHit ? "0 3px 12px rgba(122,27,27,0.25)" : "0 1px 5px rgba(0,0,0,0.08)",
                zIndex:3, minWidth:90,
                border: isHit ? "2px solid rgba(255,150,150,0.4)" : "1px solid #e0dcd4",
                animation: isDet ? "detonate 0.5s ease-out" : (isSrc && phase==="idle" ? "pulseGlow 2s infinite ease-in-out" : "none"),
                transition:"background 0.2s, color 0.2s, box-shadow 0.3s",
              }}
            >
              {showTimer ? (
                <div style={{ fontSize:22, fontWeight:900, color:"#ff3300", fontFamily:"monospace", lineHeight:1, animation:"timerPulse 0.5s infinite ease-in-out", padding:"2px 0" }}>{timer}</div>
              ) : (
                <React.Fragment>
                  <div style={{ fontSize:11, fontWeight:700, marginBottom: isHit ? 2 : 0 }}>{n.label}</div>
                  {isHit && (
                    <div style={{ animation:"errorSlide 0.3s ease-out" }}>
                      <div style={{ fontSize:9, color:"rgba(255,255,255,0.45)", marginBottom:1, fontStyle:"italic", fontWeight:400 }}>{n.formula}</div>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:3 }}>
                        <span style={{ fontSize:10, color:"rgba(255,200,200,0.55)", textDecoration:"line-through", fontFamily:"monospace" }}>{n.right}</span>
                        <span style={{ fontSize:9, color:"#ffcc00" }}>→</span>
                        <span style={{ fontSize:11, color:"#ffcc00", fontWeight:700, fontFamily:"monospace" }}>{n.wrong}</span>
                      </div>
                    </div>
                  )}
                </React.Fragment>
              )}
            </div>
          );
        })}
      </div>

      {phase === "done" ? (
        <FadeIn delay={100}>
          <div style={{ textAlign:"center", padding:"6px 0" }}>
            <div style={{ fontSize:18, color:C.darkRed, fontWeight:700, marginBottom:3, fontFamily:"monospace", animation:"countUp 0.4s ease-out" }}>
              1 cell → 13 models → 30 LPs impacted
            </div>
            <div style={{ fontSize:12, color:C.muted, marginBottom:3 }}>
              Every number you just saw is real arithmetic. One missing zero in one cell. No formula was wrong — the <em>input</em> was wrong.
            </div>
            <div style={{ fontSize:11, color:C.muted, fontStyle:"italic", marginBottom:6, opacity:0.7 }}>
              Excel Trace Dependents stops at the workbook boundary. This crosses 13 separate files.
            </div>
            <button onClick={reset} style={{ background:C.deepGreen, color:C.mint, border:"none", borderRadius:4, padding:"5px 14px", fontSize:12, fontWeight:600, cursor:"pointer" }}>Reset Cascade</button>
          </div>
        </FadeIn>
      ) : (
        <div style={{ height:40 }} />
      )}
    </div>
  );
}

  const NextSlideComponent = nextSlideIdx !== null ? slideComponents[nextSlideIdx] : null;

  return (
    <div style={{ width: "100%", height: "100vh", display: "flex", flexDirection: "column", background: "#1a1a1a", fontFamily: "'Inter', -apple-system, sans-serif" }}>

      {/* Presenter mode header bar */}
      {presenting && (
        <div style={{ background: C.accentTeal, padding: "6px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#ff3b30", animation: "pulseGlow 2s infinite" }} />
            <span style={{ fontSize: 11, fontWeight: 700, color: C.deepGreen, letterSpacing: 2 }}>PRESENTER MODE</span>
            <span style={{ fontSize: 11, color: C.deepGreen, opacity: 0.7 }}>— Audience sees slides only on their screen</span>
          </div>
          <button onClick={stopPresenting} style={{ background: C.deepGreen, color: C.mint, border: "none", borderRadius: 4, padding: "4px 12px", fontSize: 10, fontWeight: 600, cursor: "pointer" }}>END PRESENTATION</button>
        </div>
      )}

      {/* Main content area */}
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        {/* Current slide preview */}
        <div style={{ flex: 1, position: "relative" }}>
          {presenting && (
            <div style={{ position: "absolute", top: 8, left: 12, zIndex: 10, fontSize: 9, color: "#fff", background: "rgba(0,0,0,0.5)", padding: "3px 8px", borderRadius: 3 }}>
              SLIDE {current + 1} of {totalSlides}
            </div>
          )}
          <div key={key} style={{ position: "absolute", inset: 0, overflow: "auto" }}>
            <SlideComponent />
          </div>
        </div>

        {/* Right panel: Notes (+ next slide preview in presenter mode) */}
        {(showNotes || presenting) && (
          <div style={{
            width: presenting ? 380 : 320, background: "#111", borderLeft: "1px solid #333",
            display: "flex", flexDirection: "column", overflow: "hidden",
          }}>
            {/* Next slide preview (presenter mode only) */}
            {presenting && NextSlideComponent && (
              <div style={{ flex: "0 0 auto", borderBottom: "1px solid #333" }}>
                <div style={{ fontSize: 9, color: C.accentTeal, letterSpacing: 2, fontWeight: 600, padding: "8px 16px 4px", background: "#0a0a0a" }}>NEXT SLIDE</div>
                <div style={{ height: 140, position: "relative", overflow: "hidden", background: "#222" }}>
                  <div style={{ transform: "scale(0.25)", transformOrigin: "top left", width: "400%", height: "400%", pointerEvents: "none" }}>
                    <NextSlideComponent />
                  </div>
                </div>
              </div>
            )}

            {/* Speaker notes */}
            <div style={{ flex: 1, overflowY: "auto", padding: "16px 20px" }}>
              <div style={{ fontSize: 10, color: C.accentTeal, letterSpacing: 3, fontWeight: 600, marginBottom: 12 }}>SPEAKER NOTES</div>
              <pre style={{ fontSize: presenting ? 13 : 12, color: "#ccc", whiteSpace: "pre-wrap", lineHeight: 1.7, fontFamily: "'Inter', sans-serif" }}>
                {getNote(current)}
              </pre>
            </div>
          </div>
        )}
      </div>

      {/* Navigation bar */}
      <div style={{
        background: "#111", borderTop: "1px solid #333",
        padding: "10px 24px", display: "flex", alignItems: "center", gap: 8,
      }}>
        <button
          onClick={() => current > 0 && goTo(current - 1)}
          disabled={current === 0}
          style={{ background: "none", border: "none", color: current === 0 ? "#444" : "#aaa", fontSize: 18, cursor: current === 0 ? "default" : "pointer", padding: "4px 8px" }}
        >◀</button>

        <div style={{ display: "flex", gap: 4, flex: 1, justifyContent: "center", flexWrap: "wrap" }}>
          {slides.map((s, i) => (
            <button
              key={s.id}
              onClick={() => goTo(i)}
              style={{
                background: i === current ? C.accentTeal : "#222",
                color: i === current ? C.deepGreen : "#888",
                border: "none", borderRadius: 4,
                padding: "6px 10px", fontSize: 9, fontWeight: i === current ? 700 : 400,
                cursor: "pointer", transition: "all 0.2s", letterSpacing: 0.5,
              }}
            >{s.label}</button>
          ))}
        </div>

        <button
          onClick={() => current < totalSlides - 1 && goTo(current + 1)}
          disabled={current === totalSlides - 1}
          style={{ background: "none", border: "none", color: current === totalSlides - 1 ? "#444" : "#aaa", fontSize: 18, cursor: current === totalSlides - 1 ? "default" : "pointer", padding: "4px 8px" }}
        >▶</button>

        {!presenting ? (
          <>
            <button
              onClick={() => setShowNotes(p => !p)}
              style={{
                background: showNotes ? C.accentTeal : "#333",
                color: showNotes ? C.deepGreen : "#aaa",
                border: "none", borderRadius: 4,
                padding: "6px 14px", fontSize: 10, fontWeight: 600,
                cursor: "pointer", marginLeft: 8, letterSpacing: 1,
              }}
            >NOTES</button>
            <button
              onClick={startPresenting}
              style={{
                background: C.green,
                color: C.mint,
                border: "none", borderRadius: 4,
                padding: "6px 14px", fontSize: 10, fontWeight: 600,
                cursor: "pointer", marginLeft: 4, letterSpacing: 1,
              }}
            >▶ PRESENT</button>
          </>
        ) : (
          <div style={{ marginLeft: 8, fontSize: 10, color: C.accentTeal, fontWeight: 600, letterSpacing: 1 }}>
            LIVE • ESC to end
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
