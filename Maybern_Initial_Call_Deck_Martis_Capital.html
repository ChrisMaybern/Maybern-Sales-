<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  #root { width: 100vw; height: 100vh; }
  @keyframes pulseGlow { 0%,100%{box-shadow:0 0 20px rgba(58,168,124,0.12)} 50%{box-shadow:0 0 36px rgba(58,168,124,0.32)} }
  @keyframes wobble { 0%,100%{transform:rotate(-1.2deg)} 50%{transform:rotate(0.9deg)} }

const { useState, useEffect, useCallback, useRef } = React;
// Martis Capital logo as inline SVG data URI

const MARTIS_LOGO_WHITE = `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50"><polygon points="18,42 30,8 36,24" fill="#5B8F8B"/><polygon points="30,8 42,42 36,24" fill="#8BBF3F"/><polygon points="24,28 18,42 30,42" fill="#3B7A7A"/><polygon points="36,24 42,42 30,42" fill="#6DAA2F"/><text x="54" y="30" font-family="Arial,sans-serif" font-weight="600" font-size="22" fill="#FFFFFF" letter-spacing="3">MARTIS</text><text x="54" y="44" font-family="Arial,sans-serif" font-weight="400" font-size="12" fill="rgba(255,255,255,0.6)" letter-spacing="4">CAPITAL</text></svg>`)}`;
const C = {
  deepGreen: "#091D13",
  darkGreen: "#0d2619",
  green: "#17412D",
  mint: "#ECFFF5",
  warmCream: "#FDF8F3",
  darkRed: "#7A1B1B",
  accentTeal: "#3AA87C",
  muted: "#556B62",
  mutedLight: "#8aab9b",
  border: "#ddd8d0",
  martisNavy: "#1B3A5C",
  martisLight: "#2B5A8C",
};

function Fade({ children, delay = 0, style = {} }) {
  const [v, setV] = useState(false);
  useEffect(() => { const t = setTimeout(() => setV(true), delay); return () => clearTimeout(t); }, []);
  return (
    <div style={{ opacity: v?1:0, transform: v?"translateY(0)":"translateY(14px)", transition:"opacity 0.5s ease, transform 0.5s ease", ...style }}>
      {children}
    </div>
  );
}

// ═══════════════════════════════════════
// SHARED — CALCULATION PANEL ANIMATION
// ═══════════════════════════════════════
function CalcPanel() {
  const [tick, setTick] = useState(0);
  const [resolving, setResolving] = useState(new Set());
  const [done, setDone] = useState(false);
  const lpRows = [
    { lp: "Anchor LP I",     commitment: "$25.0M", contributed: "$18.4M", nav: "$31.2M" },
    { lp: "Pension Fund III",commitment: "$40.0M", contributed: "$34.1M", nav: "$52.8M" },
    { lp: "Endowment Co.",   commitment: "$10.0M", contributed: "$8.9M",  nav: "$14.1M" },
    { lp: "Family Office A", commitment: "$15.0M", contributed: "$12.2M", nav: "$19.7M" },
    { lp: "SWF Partners",    commitment: "$50.0M", contributed: "$44.0M", nav: "$71.3M" },
  ];
  const waterfall = [
    { tier: "Return of Capital",     pct: "100%", gp: "0%",   lp: "100%" },
    { tier: "Preferred Return (8%)", pct: "8%",   gp: "0%",   lp: "100%" },
    { tier: "GP Catch-Up",           pct: "—",    gp: "100%", lp: "0%"   },
    { tier: "Carried Interest",      pct: "20%",  gp: "20%",  lp: "80%"  },
  ];
  const carryValues = ["$1.24M", "$2.11M", "$0.52M", "$0.79M", "$3.38M"];
  const scenes = ["waterfall", "lp", "summary"];
  const scene = scenes[Math.min(tick, scenes.length - 1)];
  useEffect(() => {
    if (done) return;
    setResolving(new Set());
    const timers = [];
    if (scene === "lp") {
      lpRows.forEach((_, i) => {
        timers.push(setTimeout(() => {
          setResolving(prev => { const n = new Set(prev); n.add(i); return n; });
        }, 300 + i * 380));
      });
    }
    if (tick < scenes.length - 1) {
      timers.push(setTimeout(() => setTick(t => t + 1), scene === "lp" ? 4800 : 3600));
    } else {
      timers.push(setTimeout(() => setDone(true), scene === "lp" ? 4800 : 3600));
    }
    return () => timers.forEach(clearTimeout);
  }, [tick, done]);
  return (
    <div style={{ width:"100%", borderRadius:14, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(61,170,122,0.18)", overflow:"hidden", boxShadow:"0 8px 40px rgba(0,0,0,0.4)" }}>
      <div style={{ background:"rgba(0,0,0,0.25)", padding:"10px 18px", display:"flex", alignItems:"center", gap:10, borderBottom:"1px solid rgba(61,170,122,0.12)" }}>
        <div style={{ display:"flex", gap:6 }}>
          {["#ff5f57","#febc2e","#28c840"].map((c,i) => <div key={i} style={{ width:10, height:10, borderRadius:"50%", background:c, opacity:0.7 }} />)}
        </div>
        <span style={{ fontSize:11, color:"rgba(255,255,255,0.4)", marginLeft:8, letterSpacing:1 }}>
          {scene === "waterfall" ? "Waterfall · Fund I · Q4 2025" : scene === "lp" ? "LP Economics · Carry Calculation" : "Distribution Summary · Q4 2025"}
        </span>
        <div style={{ marginLeft:"auto", display:"flex", gap:6 }}>
          {scenes.map((s,i) => (
            <div key={i} style={{ width:6, height:6, borderRadius:"50%", background: s===scene ? C.accentTeal : "rgba(255,255,255,0.15)", transition:"background 0.4s" }} />
          ))}
        </div>
      </div>
      <div style={{ padding:"16px 18px", minHeight:220 }}>
        {scene === "waterfall" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr", marginBottom:8 }}>
              {["Tier","Rate","GP","LP"].map((h,i) => (
                <div key={i} style={{ fontSize:10, color:"rgba(61,170,122,0.6)", letterSpacing:2, fontWeight:700, textTransform:"uppercase", padding:"4px 10px", borderBottom:"1px solid rgba(61,170,122,0.12)" }}>{h}</div>
              ))}
            </div>
            {waterfall.map((row, i) => (
              <div key={i} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr", background: i%2===0 ? "rgba(255,255,255,0.03)" : "transparent", borderRadius:4, animation:`fadeIn 0.5s ease ${i*0.28}s both` }}>
                <div style={{ fontSize:12, color:C.mint, padding:"8px 10px", fontWeight:500 }}>{row.tier}</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.45)", padding:"8px 10px" }}>{row.pct}</div>
                <div style={{ fontSize:12, color: row.gp!=="0%" ? C.accentTeal : "rgba(255,255,255,0.25)", padding:"8px 10px", fontWeight: row.gp!=="0%" ? 700 : 400 }}>{row.gp}</div>
                <div style={{ fontSize:12, color: row.lp!=="0%" ? C.accentTeal : "rgba(255,255,255,0.25)", padding:"8px 10px", fontWeight: row.lp!=="0%" ? 700 : 400 }}>{row.lp}</div>
              </div>
            ))}
            <div style={{ marginTop:14, padding:"10px 12px", borderRadius:6, background:"rgba(61,170,122,0.08)", border:"1px solid rgba(61,170,122,0.2)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <span style={{ fontSize:11, color:"rgba(61,170,122,0.7)", letterSpacing:2, fontWeight:700 }}>DISTRIBUTABLE PROCEEDS</span>
              <span style={{ fontSize:16, color:C.accentTeal, fontWeight:700 }}>$189.1M</span>
            </div>
          </div>
        )}
        {scene === "lp" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"1.6fr 1fr 1fr 1fr 1fr", marginBottom:8 }}>
              {["LP","Commitment","Contributed","NAV","Carry"].map((h,i) => (
                <div key={i} style={{ fontSize:10, color:"rgba(61,170,122,0.6)", letterSpacing:2, fontWeight:700, textTransform:"uppercase", padding:"4px 8px", borderBottom:"1px solid rgba(61,170,122,0.12)" }}>{h}</div>
              ))}
            </div>
            {lpRows.map((row, i) => (
              <div key={i} style={{ display:"grid", gridTemplateColumns:"1.6fr 1fr 1fr 1fr 1fr", background: i%2===0 ? "rgba(255,255,255,0.03)" : "transparent", borderRadius:4 }}>
                <div style={{ fontSize:12, color:C.mint, padding:"7px 8px", fontWeight:500 }}>{row.lp}</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", padding:"7px 8px" }}>{row.commitment}</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", padding:"7px 8px" }}>{row.contributed}</div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", padding:"7px 8px" }}>{row.nav}</div>
                <div style={{ fontSize:12, padding:"7px 8px", color: resolving.has(i) ? C.accentTeal : "rgba(255,255,255,0.2)", fontWeight: resolving.has(i) ? 700 : 400, transition:"color 0.3s" }}>
                  {resolving.has(i) ? carryValues[i] : "—"}
                </div>
              </div>
            ))}
          </div>
        )}
        {scene === "summary" && (
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {[
              { label:"Total Distributions", value:"$189.1M", sub:"Q4 2025 · Fund I" },
              { label:"GP Carry Earned",      value:"$14.8M",  sub:"20% on proceeds above hurdle" },
              { label:"LP Net Distributions", value:"$174.3M", sub:"Across 5 limited partners" },
              { label:"Preferred Return Met", value:"✓ 8.0%",  sub:"All LPs above hurdle threshold" },
            ].map((item, i) => (
              <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", borderRadius:8, background: i===0 ? "rgba(61,170,122,0.1)" : "rgba(255,255,255,0.03)", border:`1px solid ${i===0 ? "rgba(61,170,122,0.25)" : "rgba(255,255,255,0.06)"}`, animation:`fadeIn 0.5s ease ${i*0.22}s both` }}>
                <div>
                  <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)", marginBottom:2 }}>{item.label}</div>
                  <div style={{ fontSize:10, color:"rgba(255,255,255,0.25)" }}>{item.sub}</div>
                </div>
                <div style={{ fontSize: i===0 ? 18 : 15, fontWeight:700, color: i===3 ? "#4ecb71" : C.accentTeal }}>{item.value}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{ padding:"8px 18px", borderTop:"1px solid rgba(61,170,122,0.1)", display:"flex", alignItems:"center", gap:8 }}>
        <div style={{ width:6, height:6, borderRadius:"50%", background: done ? "rgba(61,170,122,0.4)" : C.accentTeal, boxShadow: done ? "none" : `0 0 6px ${C.accentTeal}` }} />
        <span style={{ fontSize:10, color:"rgba(61,170,122,0.5)", letterSpacing:1 }}>
          {done ? "CALCULATION COMPLETE · Audit-ready" : "LIVE · Centralized · Audit-ready"}
        </span>
        {done && (
          <button onClick={() => { setTick(0); setDone(false); setResolving(new Set()); }} style={{ marginLeft:"auto", fontSize:10, color:"rgba(61,170,122,0.4)", background:"none", border:"1px solid rgba(61,170,122,0.2)", borderRadius:4, padding:"2px 8px", cursor:"pointer", letterSpacing:1 }}>
            REPLAY
          </button>
        )}
      </div>
    </div>
  );
}

const slideComponents = [Slide1, SlideMartisIntel, SlideGoals, Slide2, Slide3, SlideDiscovery, Slide4, Slide5];
const slideLabels = ["01 · Title", "02 · Martis Profile", "03 · Agenda", "04 · Status Quo", "05 · Where We Sit", "06 · Discovery", "07 · Fit Check", "08 · Next Step"];
const totalSlides = slideComponents.length;

function AudienceView({ slideIndex, slideKey }) {
  const S = slideComponents[slideIndex];
  const [localIdx, setLocalIdx] = useState(slideIndex);
  const [localKey, setLocalKey] = useState(slideKey);
  const [hovered, setHovered] = useState(false);
  useEffect(() => { setLocalIdx(slideIndex); setLocalKey(slideKey); }, [slideIndex, slideKey]);
  const localGo = (idx) => { if (idx >= 0 && idx < totalSlides) { setLocalIdx(idx); setLocalKey(k=>k+1); } };
  useEffect(() => {
    const h = e => {
      if (e.key==="ArrowRight"||e.key===" ") { e.preventDefault(); localGo(localIdx+1); }
      if (e.key==="ArrowLeft") { e.preventDefault(); localGo(localIdx-1); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [localIdx]);
  const CurS = slideComponents[localIdx];
  return (
    <div style={{ width:"100vw",height:"100vh",background:"#1a1a1a",overflow:"hidden",position:"relative" }}
      onMouseMove={() => !hovered && setHovered(true)}
      onMouseLeave={() => setHovered(false)}>
      <div key={localKey} style={{ position:"absolute",inset:0 }}><CurS /></div>
      {/* Floating nav — appears on hover */}
      <div style={{
        position:"absolute", bottom:20, left:"50%", transform:"translateX(-50%)",
        display:"flex", alignItems:"center", gap:12,
        background:"rgba(0,0,0,0.7)", backdropFilter:"blur(8px)",
        borderRadius:10, padding:"8px 16px",
        opacity: hovered ? 1 : 0, transition:"opacity 0.3s",
        pointerEvents: hovered ? "auto" : "none",
        zIndex: 100,
      }}>
        <button onClick={() => localGo(localIdx-1)} disabled={localIdx===0} style={{ background:localIdx===0?"transparent":"rgba(255,255,255,0.1)", border:"none", color:localIdx===0?"#444":"#fff", fontSize:16, cursor:localIdx===0?"default":"pointer", padding:"4px 12px", borderRadius:6 }}>◀</button>
        <span style={{ fontSize:12, color:"rgba(255,255,255,0.6)", fontFamily:"'DM Sans',sans-serif", minWidth:60, textAlign:"center" }}>{localIdx+1} / {totalSlides}</span>
        <button onClick={() => localGo(localIdx+1)} disabled={localIdx===totalSlides-1} style={{ background:localIdx===totalSlides-1?"transparent":"rgba(255,255,255,0.1)", border:"none", color:localIdx===totalSlides-1?"#444":"#fff", fontSize:16, cursor:localIdx===totalSlides-1?"default":"pointer", padding:"4px 12px", borderRadius:6 }}>▶</button>
      </div>
    </div>
  );
}

function App() {
  const [current, setCurrent] = useState(0);
  const [slideKey, setSlideKey] = useState(0);
  const [presenting, setPresenting] = useState(false);
  const [audienceWin, setAudienceWin] = useState(null);
  const [isAudience] = useState(() => { try { return window.name==="maybern_audience"; } catch(e){ return false; } });
  useEffect(() => {
    if (!isAudience) return;
    const handler = e => { if (e.data?.type==="maybern_slide") { setCurrent(e.data.index); setSlideKey(k=>k+1); } };
    window.addEventListener("message", handler);
    return () => window.removeEventListener("message", handler);
  }, [isAudience]);
  const goTo = useCallback((idx) => {
    setCurrent(idx); setSlideKey(k=>k+1);
    if (audienceWin && !audienceWin.closed) audienceWin.postMessage({ type:"maybern_slide",index:idx }, "*");
  }, [audienceWin]);
  const startPresenting = useCallback(() => {
    const win = window.open(window.location.href, "maybern_audience");
    if (win) { setAudienceWin(win); setPresenting(true); setTimeout(() => win.postMessage({ type:"maybern_slide",index:current }, "*"), 1200); }
  }, [current]);
  const stopPresenting = useCallback(() => {
    if (audienceWin && !audienceWin.closed) audienceWin.close();
    setAudienceWin(null); setPresenting(false);
  }, [audienceWin]);
  useEffect(() => {
    if (!presenting || !audienceWin) return;
    const id = setInterval(() => { if (audienceWin.closed) { setPresenting(false); setAudienceWin(null); } }, 1000);
    return () => clearInterval(id);
  }, [presenting, audienceWin]);
  useEffect(() => {
    const h = e => {
      if (e.key==="ArrowRight"||e.key===" ") { e.preventDefault(); if(current<totalSlides-1) goTo(current+1); }
      if (e.key==="ArrowLeft") { e.preventDefault(); if(current>0) goTo(current-1); }
      if (e.key==="Escape"&&presenting) stopPresenting();
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [current, goTo, presenting, stopPresenting]);
  if (isAudience) return <AudienceView slideIndex={current} slideKey={slideKey} />;
  const S = slideComponents[current];
  const NextS = current+1 < totalSlides ? slideComponents[current+1] : null;
  return (
    <div style={{ width:"100%",height:"100vh",display:"flex",flexDirection:"column",background:"#1a1a1a",fontFamily:"'DM Sans',sans-serif" }}>
      {presenting && (
        <div style={{ background:C.deepGreen,borderBottom:`2px solid ${C.accentTeal}`,padding:"6px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0 }}>
          <div style={{ display:"flex",alignItems:"center",gap:12 }}>
            <div style={{ display:"flex",alignItems:"center",gap:6 }}>
              <div style={{ width:7,height:7,borderRadius:"50%",background:"#ff3b30",boxShadow:"0 0 6px #ff3b30" }} />
              <span style={{ fontSize:10,fontWeight:700,color:C.accentTeal,letterSpacing:2 }}>PRESENTER MODE</span>
            </div>
            <span style={{ fontSize:10,color:"rgba(255,255,255,0.35)",letterSpacing:0.5 }}>Share the <strong style={{color:"rgba(255,255,255,0.6)"}}>Maybern Audience</strong> tab in Zoom/Teams — your client sees only the slide</span>
          </div>
          <button onClick={stopPresenting} style={{ background:"rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.5)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:4,padding:"3px 12px",fontSize:10,fontWeight:600,cursor:"pointer",letterSpacing:1 }}>END SESSION</button>
        </div>
      )}
      <div style={{ flex:1,display:"flex",overflow:"hidden" }}>
        <div style={{ flex:1,position:"relative" }}>
          <div key={slideKey} style={{ position:"absolute",inset:0,overflow:"hidden" }}><S /></div>
        </div>
        {presenting && (
          <div style={{ width:300,background:"#111",borderLeft:"1px solid #2a2a2a",display:"flex",flexDirection:"column",overflow:"hidden" }}>
            {NextS && (
              <div style={{ flexShrink:0,borderBottom:"1px solid #2a2a2a" }}>
                <div style={{ fontSize:9,color:C.accentTeal,letterSpacing:2,fontWeight:600,padding:"7px 16px 4px",background:"#0a0a0a" }}>NEXT</div>
                <div style={{ height:180,position:"relative",overflow:"hidden",background:"#1a1a1a" }}>
                  <div style={{ transform:"scale(0.28)",transformOrigin:"top left",width:"357%",height:"357%",pointerEvents:"none" }}><NextS /></div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
      <div style={{ background:"#111",borderTop:"1px solid #2a2a2a",padding:"9px 20px",display:"flex",alignItems:"center",gap:8,flexShrink:0 }}>
        <button onClick={() => current>0&&goTo(current-1)} disabled={current===0} style={{ background:current===0?"#1a1a1a":"#2a2a2a",border:current===0?"1px solid #2a2a2a":`1px solid ${C.accentTeal}44`,color:current===0?"#444":C.accentTeal,fontSize:14,cursor:current===0?"default":"pointer",padding:"6px 14px",borderRadius:6,fontWeight:700,letterSpacing:1,transition:"all 0.18s",display:"flex",alignItems:"center",gap:6 }}>◀ <span style={{fontSize:10,letterSpacing:1}}>BACK</span></button>
        <div style={{ display:"flex",gap:4,flex:1,justifyContent:"center" }}>
          {slideLabels.map((label,i) => (
            <button key={i} onClick={() => goTo(i)} style={{ background:i===current?C.accentTeal:"#222",color:i===current?C.deepGreen:"#666",border:"none",borderRadius:4,padding:"5px 10px",fontSize:9,fontWeight:i===current?700:400,cursor:"pointer",transition:"all 0.18s",letterSpacing:0.5 }}>{label}</button>
          ))}
        </div>
        <button onClick={() => current<totalSlides-1&&goTo(current+1)} disabled={current===totalSlides-1} style={{ background:current===totalSlides-1?"#1a1a1a":"#2a2a2a",border:current===totalSlides-1?"1px solid #2a2a2a":`1px solid ${C.accentTeal}44`,color:current===totalSlides-1?"#444":C.accentTeal,fontSize:14,cursor:current===totalSlides-1?"default":"pointer",padding:"6px 14px",borderRadius:6,fontWeight:700,letterSpacing:1,transition:"all 0.18s",display:"flex",alignItems:"center",gap:6 }}><span style={{fontSize:10,letterSpacing:1}}>NEXT</span> ▶</button>
        {!presenting ? (
          <>
            <button onClick={startPresenting} style={{ background:C.accentTeal,color:C.deepGreen,border:"none",borderRadius:4,padding:"5px 16px",fontSize:10,fontWeight:700,cursor:"pointer",marginLeft:3,letterSpacing:1 }}>▶ PRESENT</button>
          </>
        ) : (
          <div style={{ marginLeft:8,fontSize:10,color:C.accentTeal,fontWeight:600,letterSpacing:1 }}>LIVE · ESC to end</div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
