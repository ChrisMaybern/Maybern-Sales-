const { useState, useEffect, useCallback, useRef } = React;

const C = {
  deepGreen: "#091D13",

  accentTeal: "#3AA87C",

  border: "#ddd8d0",

function Fade({ children, delay = 0, style = {} }) {
  const [v, setV] = useState(false);
  useEffect(() => { const t = setTimeout(() => setV(true), delay); return () => clearTimeout(t); }, []);
  return (
    <div style={{ opacity: v?1:0, transform: v?"translateY(0)":"translateY(14px)", transition:"opacity 0.5s ease, transform 0.5s ease", ...style }}>
      {children}
    </div>
  );
}

      <div style={{ position: "absolute", right: -20, bottom: -80, fontFamily: "'EB Garamond', serif", fontSize: 380, color: "rgba(13,43,30,0.035)", lineHeight: 1, userSelect: "none", pointerEvents: "none" }}>?</div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "28px 48px 22px", position: "relative", zIndex: 1 }}>

        {/* Eyebrow */}
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
          <span style={{ fontSize: 11, color: "#3DAA7A", letterSpacing: 4, fontWeight: 600, textTransform: "uppercase" }}>Discovery</span>
          <div style={{ flex: 1, height: 1, background: "rgba(13,43,30,0.1)" }} />
          <span style={{ fontSize: 11, color: "rgba(13,43,30,0.35)", letterSpacing: 1 }}>Meeting 1 · Initial Call</span>

        {/* Headline */}
        <h2 style={{ fontFamily: "'EB Garamond', serif", fontSize: 46, fontWeight: 400, color: "#0D2B1E", lineHeight: 1.15, marginBottom: 28 }}>
          Questions worth asking
        </h2>

        {/* Two columns */}
        <div style={{ flex: 1, display: "flex", gap: 20 }}>
          {blocks.map((block, bi) => (
            <div key={bi} style={{
              flex: 1,
              background: "#fff",
              borderRadius: 12,
              border: "1px solid rgba(13,43,30,0.1)",

              display: "flex",
              flexDirection: "column",
              gap: 18,
            }}>
              {/* Block header */}
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 44, height: 44, borderRadius: 10, background: `${block.color}18`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>
                  {block.icon}
                </div>
                <div>
                  <div style={{ fontSize: 11, color: block.color, letterSpacing: 3, fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>{block.label}</div>

                </div>
              </div>

              {/* Questions */}
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {block.questions.map((q, qi) => (
                  <div key={qi} style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
                    <div style={{
                      width: 24, height: 24, borderRadius: "50%", background: `${block.color}15`,

        </div>

        {/* Footer callout */}
        <div style={{ marginTop: 18, background: "#0D2B1E", borderRadius: 8, padding: "14px 26px", display: "flex", alignItems: "center", gap: 16 }}>
          <span style={{ fontSize: 20 }}>💡</span>
          <p style={{ fontSize: 15, color: "#ECF5F0", fontFamily: "'EB Garamond', serif", fontStyle: "italic", lineHeight: 1.5, margin: 0 }}>
            Listen for: LP pressure, audit prep stress, a past bad experience with a vendor, or a recent distribution error. Any of these is a buying signal.
          </p>
        </div>
      </div>
    </div>
  );
}

function Slide4() {
  const [revealed, setRevealed] = useState(new Set());
  const shifts = [
    { today:"Manual reconciliation every close",      tomorrow:"Centralized logic — reconciled by design" },
    { today:"Shadow models to verify admin output",    tomorrow:"Single source of truth — audit-ready by default" },
    { today:"Knowledge concentrated in 1–2 people",   tomorrow:"Systemized logic that survives turnover" },
    { today:"Formulas you hope are still correct",     tomorrow:"Governed rules engine — no formula risk" },
    { today:"Responding ad-hoc to LP questions",       tomorrow:"Pre-configured outputs with full lineage" },
  ];
  const toggle = (i) => setRevealed(prev => { const n=new Set(prev); n.has(i)?n.delete(i):n.add(i); return n; });

  const triggers = [
    { event:"First realization or exit",       consequence:"Waterfall math becomes binding — errors are irreversible" },
    { event:"First time paying carry",         consequence:"GP compensation tied directly to model accuracy" },
    { event:"New fund launch",                 consequence:"Legacy processes don't carry over cleanly" },
    { event:"Increased audit scrutiny",        consequence:"Models must be explainable, not just accurate" },
  ];

  return (
    <div style={{ background:C.warmCream,height:"100%",padding:"36px 72px",display:"flex",flexDirection:"column",justifyContent:"center",gap:20 }}>
      <div>
        <div style={{ width:60,height:3,background:C.accentTeal,marginBottom:10 }} />
        <h2 style={{ fontFamily:"'EB Garamond',serif",fontSize:34,color:C.deepGreen,fontWeight:400,marginBottom:6 }}>What actually changes</h2>
        <p style={{ fontSize:15,color:C.muted }}>Click each row to reveal the future state.</p>
      </div>

      <div>
        <div style={{ display:"flex",gap:0,marginBottom:6 }}>
          <div style={{ flex:1,background:C.darkRed,padding:"8px 18px",borderRadius:"6px 0 0 6px",textAlign:"center" }}>
            <span style={{ fontSize:12,fontWeight:700,color:"#fff",letterSpacing:3 }}>TODAY</span>
          </div>
          <div style={{ flex:1,background:C.green,padding:"8px 18px",borderRadius:"0 6px 6px 0",textAlign:"center" }}>
            <span style={{ fontSize:12,fontWeight:700,color:"#fff",letterSpacing:3 }}>AFTER MAYBERN</span>
          </div>
        </div>
        {shifts.map((s,i) => (
          <div key={i} onClick={() => toggle(i)} style={{ display:"flex",alignItems:"center",cursor:"pointer",background:i%2===0?"#fff":"transparent",borderRadius:5,padding:"10px 16px",marginBottom:2 }}>
            <div style={{ flex:1,fontSize:14,color:C.darkRed,lineHeight:1.5 }}>{s.today}</div>
            <div style={{ margin:"0 10px",fontSize:18,color:C.accentTeal }}>→</div>
            <div style={{ flex:1,fontSize:14,color:C.green,lineHeight:1.5,opacity:revealed.has(i)?1:0.25,filter:revealed.has(i)?"none":"blur(3px)",transition:"all 0.4s ease" }}>{s.tomorrow}</div>
          </div>
        ))}
      </div>

      <div style={{ background:C.deepGreen,borderRadius:8,padding:"16px 24px" }}>
        <div style={{ fontSize:11,color:C.accentTeal,fontWeight:700,letterSpacing:3,marginBottom:10 }}>WHEN THE MODEL GETS TESTED</div>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8 }}>
          {triggers.map((t,i) => (
            <div key={i} style={{ display:"flex",alignItems:"flex-start",gap:8 }}>
              <div style={{ width:6,height:6,borderRadius:"50%",background:C.darkRed,marginTop:5,flexShrink:0 }} />
              <div>
                <div style={{ fontSize:13,fontWeight:600,color:C.mint,marginBottom:1 }}>{t.event}</div>
                <div style={{ fontSize:12,color:C.mint,opacity:0.55,lineHeight:1.4 }}>{t.consequence}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// SPEAKER NOTES
// ═══════════════════════════════════════
const notes = [
`SLIDE 1 — TITLE

No notes needed. Introduce yourself, one sentence. 10 seconds max.`,

`SLIDE 2 — WHO WE WORK WITH

QUESTIONS
• "Walk me through how your team handles the quarter-end close — what does that process actually look like?"
• "Where do the waterfall and fee calculations actually live today?"
• "Who built those models, and who runs them each quarter?"
• "What happens if that person is unavailable during close?"
• "Has there ever been a moment where you weren't sure if a number was right before it went out?"

LISTEN FOR
• "One person owns all of it"
• "We double-check everything manually"
• "That's why close takes so long"
• Mentions of near-misses, restatements, or reconciliation pain
• "It works fine" — normalize and probe gently`,

`SLIDE 3 — WHERE MAYBERN SITS

QUESTIONS

• "How does the admin get the numbers they report — does that come from your models or theirs?"
• "If you had to scale this process across additional vehicles, what breaks first?"
• "If two systems both technically worked, what would make one safer or more defensible long term?"

LISTEN FOR
• "We run our own shadow books to verify the admin"
• "The admin produces it but we check it ourselves"
• "We would still use the admin but finally own the math"
• "This mirrors how our structure actually works"`,

`SLIDE 4 — WHAT CHANGES

QUESTIONS

• "If the primary logic owner were unavailable during close, how exposed would the team feel?"
• "What's the upcoming fundraise, audit, or reporting milestone that changes how comfortable you are waiting?"

LISTEN FOR
• Timeline-specific answers — fundraise dates, audit windows, new fund launches
• "Only one or two people really understand the waterfall"
• "It works right now" — normalize and attach urgency
• "This would save us X hours per quarter"`,

`SLIDE 5 — NEXT STEP

QUESTIONS
• "To pressure-test your structure properly we'll need to review sample waterfall language and real files — would that require an NDA?"
• "Who else needs to be in the room to evaluate this safely — not just functionally?"
• "What does the path from 'this makes sense' to 'let's move forward' look like inside your org?"

LISTEN FOR
• Who proactively offers to schedule — that's your champion
• "Our CFO signs off" / "Our managing partner reviews these"
• Names and titles of decision-makers`,
];

// ═══════════════════════════════════════
// SHELL
// ═══════════════════════════════════════
const slideComponents = [Slide1, Slide2, SlideDiscovery, Slide3, Slide4, Slide5];
const slideLabels = ["01 · Title", "02 · Status Quo", "03 · Discovery", "04 · Where We Sit", "05 · So What", "06 · Next Step"];
const totalSlides = slideComponents.length;

function AudienceView({ slideIndex, slideKey }) {
  const S = slideComponents[slideIndex];
  return (
    <div style={{ width:"100vw",height:"100vh",background:"#1a1a1a",overflow:"hidden" }}>
      <div key={slideKey} style={{ position:"absolute",inset:0 }}><S /></div>
    </div>
  );
}

function App() {
  const [current, setCurrent] = useState(0);
  const [slideKey, setSlideKey] = useState(0);
  const [showNotes, setShowNotes] = useState(false);
  const [presenting, setPresenting] = useState(false);
  const [audienceWin, setAudienceWin] = useState(null);
  const [isAudience] = useState(() => { try { return window.name==="maybern_audience"; } catch(e){ return false; } });

  useEffect(() => {
    if (!isAudience) return;
    const handler = e => { if (e.data?.type==="maybern_slide") { setCurrent(e.data.index); setSlideKey(k=>k+1); } };
    window.addEventListener("message", handler);
    return () => window.removeEventListener("message", handler);
  }, [isAudience]);

  const goTo = useCallback((idx) => {
    setCurrent(idx); setSlideKey(k=>k+1);
    if (audienceWin && !audienceWin.closed) audienceWin.postMessage({ type:"maybern_slide",index:idx }, "*");
  }, [audienceWin]);

  const startPresenting = useCallback(() => {
    const win = window.open(window.location.href,"maybern_audience",`width=${screen.width},height=${screen.height},left=0,top=0`);
    if (win) { setAudienceWin(win); setPresenting(true); setShowNotes(true); setTimeout(() => win.postMessage({ type:"maybern_slide",index:current }, "*"), 2000); }
  }, [current]);

  const stopPresenting = useCallback(() => {
    if (audienceWin && !audienceWin.closed) audienceWin.close();
    setAudienceWin(null); setPresenting(false);
  }, [audienceWin]);

  useEffect(() => {
    if (!presenting || !audienceWin) return;
    const id = setInterval(() => { if (audienceWin.closed) { setPresenting(false); setAudienceWin(null); } }, 1000);
    return () => clearInterval(id);
  }, [presenting, audienceWin]);

  useEffect(() => {
    const h = e => {
      if (e.key==="ArrowRight"||e.key===" ") { e.preventDefault(); if(current<totalSlides-1) goTo(current+1); }
      if (e.key==="ArrowLeft") { e.preventDefault(); if(current>0) goTo(current-1); }
      if (e.key==="n"||e.key==="N") setShowNotes(p=>!p);
      if (e.key==="Escape"&&presenting) stopPresenting();
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [current, goTo, presenting, stopPresenting]);

  if (isAudience) return <AudienceView slideIndex={current} slideKey={slideKey} />;

  const S = slideComponents[current];
  const NextS = current+1 < totalSlides ? slideComponents[current+1] : null;

  return (
    <div style={{ width:"100%",height:"100vh",display:"flex",flexDirection:"column",background:"#1a1a1a",fontFamily:"'DM Sans',sans-serif" }}>
      {presenting && (
        <div style={{ background:C.accentTeal,padding:"5px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0 }}>
          <div style={{ display:"flex",alignItems:"center",gap:8 }}>
            <div style={{ width:7,height:7,borderRadius:"50%",background:"#ff3b30" }} />
            <span style={{ fontSize:10,fontWeight:700,color:C.deepGreen,letterSpacing:2 }}>PRESENTER MODE</span>
          </div>
          <button onClick={stopPresenting} style={{ background:C.deepGreen,color:C.mint,border:"none",borderRadius:4,padding:"3px 12px",fontSize:10,fontWeight:600,cursor:"pointer" }}>END</button>
        </div>
      )}

      <div style={{ flex:1,display:"flex",overflow:"hidden" }}>
        <div style={{ flex:1,position:"relative" }}>
          <div key={slideKey} style={{ position:"absolute",inset:0,overflow:"hidden" }}><S /></div>
        </div>

        {(showNotes||presenting) && (
          <div style={{ width:presenting?360:300,background:"#111",borderLeft:"1px solid #2a2a2a",display:"flex",flexDirection:"column",overflow:"hidden" }}>
            {presenting && NextS && (
              <div style={{ flexShrink:0,borderBottom:"1px solid #2a2a2a" }}>
                <div style={{ fontSize:9,color:C.accentTeal,letterSpacing:2,fontWeight:600,padding:"7px 16px 4px",background:"#0a0a0a" }}>NEXT</div>
                <div style={{ height:130,position:"relative",overflow:"hidden",background:"#1a1a1a" }}>
                  <div style={{ transform:"scale(0.24)",transformOrigin:"top left",width:"417%",height:"417%",pointerEvents:"none" }}><NextS /></div>
                </div>
              </div>
            )}
            <div style={{ flex:1,overflowY:"auto",padding:"14px 18px" }}>
              <div style={{ fontSize:9,color:C.accentTeal,letterSpacing:3,fontWeight:600,marginBottom:10 }}>SPEAKER NOTES</div>
              <pre style={{ fontSize:presenting?13:12,color:"#ccc",whiteSpace:"pre-wrap",lineHeight:1.75,fontFamily:"'DM Sans',sans-serif" }}>
                {notes[current]}
              </pre>
            </div>
          </div>
        )}
      </div>

      <div style={{ background:"#111",borderTop:"1px solid #2a2a2a",padding:"9px 20px",display:"flex",alignItems:"center",gap:8,flexShrink:0 }}>
        <button onClick={() => current>0&&goTo(current-1)} disabled={current===0} style={{ background:"none",border:"none",color:current===0?"#333":"#888",fontSize:18,cursor:current===0?"default":"pointer",padding:"3px 7px" }}>◀</button>
        <div style={{ display:"flex",gap:4,flex:1,justifyContent:"center" }}>
          {slideLabels.map((label,i) => (
            <button key={i} onClick={() => goTo(i)} style={{ background:i===current?C.accentTeal:"#222",color:i===current?C.deepGreen:"#666",border:"none",borderRadius:4,padding:"5px 10px",fontSize:9,fontWeight:i===current?700:400,cursor:"pointer",transition:"all 0.18s",letterSpacing:0.5 }}>{label}</button>
          ))}
        </div>
        <button onClick={() => current<totalSlides-1&&goTo(current+1)} disabled={current===totalSlides-1} style={{ background:"none",border:"none",color:current===totalSlides-1?"#333":"#888",fontSize:18,cursor:current===totalSlides-1?"default":"pointer",padding:"3px 7px" }}>▶</button>
        {!presenting ? (
          <>
            <button onClick={() => setShowNotes(p=>!p)} style={{ background:showNotes?C.accentTeal:"#2a2a2a",color:showNotes?C.deepGreen:"#888",border:"none",borderRadius:4,padding:"5px 12px",fontSize:10,fontWeight:600,cursor:"pointer",marginLeft:6,letterSpacing:1 }}>NOTES</button>
            <button onClick={startPresenting} style={{ background:C.green,color:C.mint,border:"none",borderRadius:4,padding:"5px 12px",fontSize:10,fontWeight:600,cursor:"pointer",marginLeft:3,letterSpacing:1 }}>▶ PRESENT</button>
          </>
        ) : (
          <div style={{ marginLeft:8,fontSize:10,color:C.accentTeal,fontWeight:600,letterSpacing:1 }}>LIVE · ESC to end</div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
